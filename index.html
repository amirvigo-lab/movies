<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יומן הסרטים שלי</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2503/2503508.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2503/2503508.png">
    <!-- טעינת Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- טעינת אייקונים -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* הסתרת פס הגלילה בלשוניות */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen">

    <!-- הדר -->
    <header class="bg-gray-800 shadow-lg py-6 sticky top-0 z-10">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <i data-lucide="film" class="text-yellow-400 w-8 h-8"></i>
                <h1 class="text-2xl md:text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-l from-yellow-400 to-yellow-200">
                    יומן הסרטים שלי
                </h1>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        
        <!-- אזור חיפוש, סינון ועשורים -->
        <div class="flex flex-col gap-4 mb-8 bg-gray-800 p-4 rounded-xl shadow-md border border-gray-700">
            
            <div class="flex flex-col md:flex-row gap-4">
                <!-- שורת חיפוש -->
                <div class="relative flex-1">
                    <i data-lucide="search" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 w-5 h-5"></i>
                    <input
                        type="text"
                        id="searchInput"
                        placeholder="חיפוש סרט או ז'אנר..."
                        class="w-full bg-gray-900 border border-gray-700 text-white rounded-lg py-3 pr-10 pl-4 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 transition-all"
                    >
                </div>
                
                <!-- מיון -->
                <div class="flex items-center gap-2 bg-gray-900 border border-gray-700 rounded-lg px-3">
                    <span class="text-gray-400 text-sm whitespace-nowrap">מיון לפי:</span>
                    <select id="sortSelect" class="bg-transparent text-white py-3 pr-2 pl-6 focus:outline-none appearance-none cursor-pointer">
                        <option value="rating" class="bg-gray-800">דירוג (גבוה לנמוך)</option>
                        <option value="yearDesc" class="bg-gray-800">שנה (חדש לישן)</option>
                        <option value="yearAsc" class="bg-gray-800">שנה (ישן לחדש)</option>
                        <option value="title" class="bg-gray-800">שם הסרט (א-ת)</option>
                    </select>
                </div>
            </div>

            <!-- מסנן עשורים/שנים -->
            <div class="flex items-center justify-between md:justify-start gap-4 border-t border-gray-700 pt-4 mt-2">
                <div class="flex items-center gap-2 text-gray-400">
                    <i data-lucide="calendar-range" class="w-5 h-5 text-yellow-400"></i>
                    <span class="text-sm font-medium">סינון שנים:</span>
                </div>
                
                <div class="flex items-center gap-2">
                    <select id="startYear" class="bg-gray-900 border border-gray-700 text-white rounded-lg py-1.5 px-3 focus:outline-none focus:border-yellow-400 text-sm cursor-pointer appearance-none">
                        <!-- יאוכלס דינמית -->
                    </select>
                    <span class="text-gray-500">-</span>
                    <select id="endYear" class="bg-gray-900 border border-gray-700 text-white rounded-lg py-1.5 px-3 focus:outline-none focus:border-yellow-400 text-sm cursor-pointer appearance-none">
                        <!-- יאוכלס דינמית -->
                    </select>
                </div>
            </div>

        </div>

        <!-- לשוניות קטגוריות -->
        <div id="categoriesContainer" class="flex overflow-x-auto gap-2 mb-8 pb-2 hide-scrollbar">
            <!-- יאוכלס דינמית ע"י JS -->
        </div>

        <!-- אזור רשת הסרטים -->
        <div id="loadingIndicator" class="text-center py-20 flex flex-col items-center">
            <i data-lucide="loader-2" class="w-16 h-16 text-yellow-400 animate-spin mb-4"></i>
            <h2 class="text-xl text-gray-400">מושך את יומן הסרטים שלך מ-GitHub...</h2>
        </div>

        <div id="noResults" class="hidden text-center py-20">
            <i data-lucide="film" class="w-16 h-16 text-gray-600 mx-auto mb-4"></i>
            <h2 class="text-xl text-gray-400">לא נמצאו סרטים מתאימים לחיפוש</h2>
        </div>

        <div id="moviesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- יאוכלס דינמית ע"י JS -->
        </div>
    </main>

    <script>
        // משתני מערכת
        let moviesData = [];
        let searchTerm = '';
        let sortBy = 'rating';
        let selectedCategory = 'הכל';
        let minAvailableYear = 1900;
        let maxAvailableYear = new Date().getFullYear();
        let currentStartYear = 1900;
        let currentEndYear = maxAvailableYear;
        let seenMovies = new Set(JSON.parse(localStorage.getItem('seenMovies') || '[]'));

        // רכיבי DOM
        const searchInput = document.getElementById('searchInput');
        const sortSelect = document.getElementById('sortSelect');
        const categoriesContainer = document.getElementById('categoriesContainer');
        const moviesGrid = document.getElementById('moviesGrid');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const noResults = document.getElementById('noResults');
        const startYearSelect = document.getElementById('startYear');
        const endYearSelect = document.getElementById('endYear');

        // אתחול האפליקציה
        async function init() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/amirvigo-lab/movies/refs/heads/main/moviesdata.json');
                const data = await response.json();
                
                let minYearFound = 9999;
                let maxYearFound = 0;

                moviesData = data.map((item, index) => {
                    const knownFields = ["שם הסרט", "שנת יציאה", "במאי", "ציון", "דירוג"];
                    const genres = Object.keys(item)
                        .filter(key => !knownFields.includes(key) && item[key] === "1")
                        .join(', ');
                    
                    const year = parseInt(item['שנת יציאה']) || 0;
                    if (year > 0) {
                        if (year < minYearFound) minYearFound = year;
                        if (year > maxYearFound) maxYearFound = year;
                    }

                    return {
                        id: `github-${index}`,
                        title: item['שם הסרט'] || 'ללא כותרת',
                        year: item['שנת יציאה'] || '',
                        yearNum: year,
                        genre: genres,
                        rating: parseFloat(item['ציון']) || 0,
                        director: item['במאי'] || 'לא ידוע',
                        personalRating: item['דירוג'] || '-'
                    };
                });

                // הגדרת טווחי השנים הדינמיים לפי הנתונים
                if (minYearFound !== 9999) {
                    // נעגל לעשור הקרוב למטה (למשל 1934 יהפוך ל-1930)
                    minAvailableYear = Math.floor(minYearFound / 10) * 10;
                }
                currentStartYear = minAvailableYear;
                
                loadingIndicator.classList.add('hidden');
                initYearFilters();
                renderCategories();
                renderMovies();
            } catch (error) {
                console.error("שגיאה במשיכת הנתונים", error);
                loadingIndicator.innerHTML = '<h2 class="text-xl text-red-400">שגיאה בטעינת הנתונים מ-GitHub.</h2>';
            }
        }

        // אתחול תפריטי השנים
        function initYearFilters() {
            let options = '';
            // ניצור אופציות בקפיצות של 10 שנים (עשורים)
            for (let y = minAvailableYear; y <= maxAvailableYear; y += 10) {
                options += `<option value="${y}">${y}</option>`;
            }
            // נוסיף את השנה הנוכחית בסוף אם היא לא עשור עגול
            if (maxAvailableYear % 10 !== 0) {
                 options += `<option value="${maxAvailableYear}">${maxAvailableYear}</option>`;
            }

            startYearSelect.innerHTML = options;
            endYearSelect.innerHTML = options;

            startYearSelect.value = currentStartYear;
            endYearSelect.value = maxAvailableYear;
        }

        // רינדור הלשוניות
        function renderCategories() {
            const uniqueCategories = new Set();
            moviesData.forEach(movie => {
                if (movie.genre) {
                    movie.genre.split(',').forEach(g => {
                        const trimmed = g.trim();
                        if (trimmed) uniqueCategories.add(trimmed);
                    });
                }
            });

            const categories = ['הכל', ...Array.from(uniqueCategories).sort()];
            
            categoriesContainer.innerHTML = categories.map(category => {
                const safeCategory = category.replace(/"/g, '&quot;').replace(/'/g, "\\'");
                return `
                <button 
                    onclick="setCategory('${safeCategory}')"
                    class="px-5 py-2 rounded-full text-sm font-medium whitespace-nowrap transition-all duration-200 
                    ${selectedCategory === category 
                        ? 'bg-yellow-500 text-gray-900 shadow-[0_0_10px_rgba(234,179,8,0.3)]' 
                        : 'bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-gray-200 border border-gray-700'}"
                >
                    ${category}
                </button>
                `;
            }).join('');
        }

        // רינדור כרטיסיות הסרטים
        function renderMovies() {
            let filtered = moviesData;

            // סינון לפי קטגוריה
            if (selectedCategory !== 'הכל') {
                filtered = filtered.filter(movie => 
                    movie.genre.split(',').map(g => g.trim()).includes(selectedCategory)
                );
            }

            // סינון לפי עשורים/שנים
            filtered = filtered.filter(movie => {
                if (!movie.yearNum) return true; // אם אין שנה, נציג אותו בכל מקרה
                return movie.yearNum >= currentStartYear && movie.yearNum <= currentEndYear;
            });

            // סינון לפי חיפוש
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filtered = filtered.filter(movie => 
                    movie.title.toLowerCase().includes(term) ||
                    movie.genre.toLowerCase().includes(term)
                );
            }

            // מיון
            filtered.sort((a, b) => {
                if (sortBy === 'rating') return b.rating - a.rating;
                if (sortBy === 'yearDesc') return b.yearNum - a.yearNum;
                if (sortBy === 'yearAsc') return a.yearNum - b.yearNum;
                if (sortBy === 'title') return a.title.localeCompare(b.title, 'he');
                return 0;
            });

            // הגבלת כמות (1000 להכל, 100 לשאר)
            const limit = selectedCategory === 'הכל' ? 1000 : 100;
            filtered = filtered.slice(0, limit);

            if (filtered.length === 0) {
                moviesGrid.innerHTML = '';
                noResults.classList.remove('hidden');
            } else {
                noResults.classList.add('hidden');
                moviesGrid.innerHTML = filtered.map((movie, index) => {
                    const isSeen = seenMovies.has(movie.id);
                    const cardClasses = isSeen 
                        ? 'bg-green-900/10 border-green-500/40 hover:border-green-400 shadow-[0_0_10px_rgba(34,197,94,0.1)]' 
                        : 'bg-gray-800 border-gray-700 hover:border-yellow-500/50 hover:shadow-[0_0_15px_rgba(234,179,8,0.15)]';
                    
                    const btnClasses = isSeen
                        ? 'bg-green-500/20 text-green-400 border-green-500/30 hover:bg-green-500/30'
                        : 'bg-gray-700/50 text-gray-400 border-gray-600 hover:bg-gray-700 hover:text-white';

                    return `
                        <div class="rounded-xl overflow-hidden border transition-all duration-300 group ${cardClasses}">
                            <div class="p-5 flex flex-col h-full">
                                <div class="flex justify-between items-start mb-3 gap-3">
                                    <div class="flex items-start gap-3">
                                        <div class="flex items-center justify-center min-w-[2.25rem] h-8 px-2 rounded-lg bg-gray-900 text-yellow-500 text-sm font-black border border-gray-700 shadow-inner shrink-0 group-hover:border-yellow-500/50 group-hover:bg-yellow-500/10 transition-colors">
                                            #${index + 1}
                                        </div>
                                        <h3 class="text-xl font-bold text-white leading-tight group-hover:text-yellow-400 transition-colors pt-0.5">
                                            ${movie.title}
                                        </h3>
                                    </div>
                                    <div class="flex items-center gap-1 bg-gray-900 px-2 py-1 rounded-md border border-gray-700 shrink-0">
                                        <i data-lucide="star" class="w-4 h-4 text-yellow-400 fill-current"></i>
                                        <span class="font-bold text-yellow-400">${movie.rating}</span>
                                    </div>
                                </div>
                                
                                <div class="flex flex-wrap gap-2 mb-4 text-sm text-gray-400">
                                    ${movie.year ? `
                                        <div class="flex items-center gap-1 bg-gray-900/50 px-2 py-1 rounded">
                                            <i data-lucide="calendar" class="w-3 h-3"></i>
                                            <span>${movie.year}</span>
                                        </div>
                                    ` : ''}
                                    ${movie.genre ? `
                                        <div class="flex items-center gap-1 bg-gray-900/50 px-2 py-1 rounded">
                                            <i data-lucide="hash" class="w-3 h-3"></i>
                                            <span>${movie.genre}</span>
                                        </div>
                                    ` : ''}
                                </div>
                                
                                <p class="text-gray-300 text-sm mt-auto border-t border-gray-700/50 pt-4">
                                    במאי: ${movie.director} | דירוג אישי: ${movie.personalRating}
                                </p>

                                <button 
                                    onclick="toggleSeen('${movie.id}')"
                                    class="mt-4 flex items-center justify-center gap-2 w-full py-2 rounded-lg text-sm font-medium transition-colors border ${btnClasses}"
                                >
                                    ${isSeen 
                                        ? '<i data-lucide="eye" class="w-4 h-4"></i><span>נצפה לאחרונה</span>' 
                                        : '<i data-lucide="eye-off" class="w-4 h-4"></i><span>סמן כנצפה</span>'}
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
            }
            
            lucide.createIcons();
        }

        // אירועים
        searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value;
            renderMovies();
        });

        sortSelect.addEventListener('change', (e) => {
            sortBy = e.target.value;
            renderMovies();
        });

        startYearSelect.addEventListener('change', (e) => {
            currentStartYear = parseInt(e.target.value);
            // מניעת מצב ששנת ההתחלה גדולה משנת הסיום
            if (currentStartYear > currentEndYear) {
                currentEndYear = currentStartYear;
                endYearSelect.value = currentEndYear;
            }
            renderMovies();
        });

        endYearSelect.addEventListener('change', (e) => {
            currentEndYear = parseInt(e.target.value);
            // מניעת מצב ששנת הסיום קטנה משנת ההתחלה
            if (currentEndYear < currentStartYear) {
                currentStartYear = currentEndYear;
                startYearSelect.value = currentStartYear;
            }
            renderMovies();
        });

        window.setCategory = function(category) {
            selectedCategory = category;
            renderCategories();
            renderMovies();
        };

        window.toggleSeen = function(movieId) {
            if (seenMovies.has(movieId)) {
                seenMovies.delete(movieId);
            } else {
                seenMovies.add(movieId);
            }
            localStorage.setItem('seenMovies', JSON.stringify(Array.from(seenMovies)));
            renderMovies();
        };

        // הפעלה ראשונית
        init();
    </script>
</body>
</html>
